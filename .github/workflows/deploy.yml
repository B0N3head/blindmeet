name: Deploy

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy blindmeet-prod
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          script: |
            set -e
            cd /var/www/blindmeet-prod
            git fetch origin main
            git checkout main
            git reset --hard origin/main
            cd /var/www
            docker compose build blindmeet-prod
            docker compose up -d blindmeet-prod
            docker image prune -f